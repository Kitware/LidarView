# Linux-specific builder configurations and build commands

## Base configurations
.linux:
  variables:
    GIT_CLONE_PATH: $CI_BUILDS_DIR/kitware-lidarview-ci
    GIT_SUBMODULE_STRATEGY: none

.ubuntu22:
  extends: .linux
  image: "gitlab.kitware.com:4567/lidarview/lidarview:ci-ubuntu22-20251002"

.ubuntu22_debug:
  extends: .ubuntu22

  variables:
    CMAKE_CONFIGURATION: ubuntu22_debug

.ubuntu22_debug_tidy:
  extends: .ubuntu22_debug

  variables:
    CMAKE_CONFIGURATION: ubuntu22_debug_tidy

.ubuntu24_pv_latest:
  extends: .linux
  image: "kitware/paraview-for-ci:latest"

  variables:
    CMAKE_CONFIGURATION: ubuntu24_pv_latest

## Tags

.linux_builder_tags:
  tags:
    - build
    - docker
    - linux-x86_64
    - lidarview

.linux_tester_tags:
  tags:
    - docker
    - lidarview
    - linux-x86_64

## Linux-specific scripts

.before_script_linux: &before_script_linux
  - cmake --version
  - ninja --version
  - "git submodule update --init --recursive || :"
  - git submodule sync --recursive
  - git submodule update --init --recursive --force
  - .gitlab/ci/checkout_trigger_submodule.sh

.install_required_deps: &install_required_deps
  - apt update
  # Install LidarView deps
  - apt install -y --no-install-recommends
    curl libpcap-dev libyaml-cpp-dev libeigen3-dev libx11-dev
    libboost-dev libboost-atomic-dev libboost-filesystem-dev libboost-program-options-dev libboost-system-dev libboost-thread-dev
  - $PWD/.gitlab/ci/docker/ubuntu22/install_tins.sh
  - $PWD/.gitlab/ci/docker/ubuntu22/install_nanoflann.sh

.build_linux: &build_linux
  - cmake -S $CI_PROJECT_DIR -B $CI_PROJECT_DIR/build -C .gitlab/ci/configure_$CMAKE_CONFIGURATION.cmake -GNinja
  - cmake --build $CI_PROJECT_DIR/build --parallel 8

.test_linux: &test_linux
  - cp .gitlab/ci/CMakePresets.json $CI_PROJECT_DIR
  - xvfb-run ctest --preset ci_$CMAKE_CONFIGURATION

.cmake_build_linux:
  stage: build

  script:
    - *before_script_linux
    - *build_linux
  interruptible: true

.cmake_build_linux_with_required_deps:
  stage: build

  script:
    - *before_script_linux
    - *install_required_deps
    - *build_linux
  interruptible: true

.cmake_test_linux:
  stage: test

  script:
    - *before_script_linux
    - *test_linux
  interruptible: true

.cmake_test_linux_with_required_deps:
  stage: test

  script:
    - *before_script_linux
    - *install_required_deps
    - *test_linux
  interruptible: true

.clang_format_check:
  stage: analyse

  script:
    - *before_script_linux
    - git fetch --all
    - .gitlab/ci/clang_format_check.sh
    - .gitlab/ci/json_schema_check.sh
  allow_failure:
    exit_codes: 1

  interruptible: true

.clang_tidy_check:
  stage: analyse

  script:
    - *before_script_linux
    - git fetch --all
    - cp .clang-tidy $CI_PROJECT_DIR/build
    - .gitlab/ci/clang_tidy_check.sh
  allow_failure:
    exit_codes: 1

  interruptible: true
