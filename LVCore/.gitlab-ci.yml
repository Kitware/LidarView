# launch lidarview CI, see https://docs.gitlab.com/ee/ci/multi_project_pipelines.html
include:
  - project: 'lidarview/lidarview'
    ref: master
    file:
        - '.gitlab/rules.yml'

stages:
    - test

lidarview:test:
    variables:
        TRIGGER_MODULE_BRANCH: $CI_COMMIT_REF_NAME
        TRIGGER_MODULE_PATH: LVCore
    extends:
        - .run_manually
    trigger:
        project: lidarview/lidarview
        branch: master
        strategy: depend
